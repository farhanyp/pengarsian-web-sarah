version: '3.8'

services:
    db:
        image: postgres:18
        container_name: arsip-sd-harapan-db
        restart: always
        environment:
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
            POSTGRES_DB: ${DB_DATABASE:-arsip_smk_mandiri_app_develop}
        ports:
            - '5432:5432'
        volumes:
            - 'D:/program/docker/postgres-data:/var/lib/postgresql'